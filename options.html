<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Copy Hyperlink — Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      padding: 16px 20px;
      min-width: 360px;
      color: #222;
    }
    h1 { font-size: 16px; margin: 0 0 12px; }
    p  { color: #555; line-height: 1.5; }
    .row { margin: 14px 0; display: flex; align-items: center; gap: 10px; }
    #shortcut {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #f8f8f8;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      min-height: 18px;
    }
    button {
      padding: 6px 12px;
      border: 1px solid #888;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #f0f0f0; }
    #status { color: #2a7d2e; font-size: 12px; min-height: 16px; }
    .hint { font-size: 12px; color: #777; }
  </style>
</head>
<body>
  <h1>Copy Hyperlink — Shortcut</h1>
  <p>Press the shortcut you want to use. The default is <b>Cmd+C</b> (macOS) or <b>Ctrl+C</b> (Windows/Linux). The shortcut only triggers when no text is selected on the page.</p>

  <div class="row">
    <div id="shortcut" tabindex="0" aria-label="Current shortcut">—</div>
    <button id="record">Record</button>
    <button id="reset">Reset</button>
  </div>
  <div class="row">
    <button id="save">Save</button>
    <span id="status"></span>
  </div>
  <p class="hint">Tip: must include a non-modifier key. Modifiers supported: Ctrl, Cmd (Meta), Alt, Shift.</p>

  <script src="options.js"></script>
</body>
</html>
